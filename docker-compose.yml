services:
  mobile:
    build:
      context: .
      dockerfile: apps/mobile/DOCKERFILE

    container_name: scanwise-mobile

    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"

    volumes:
      - .:/app
      - /app/node_modules

    stdin_open: true
    tty: true

    command: pnpm start --lan
